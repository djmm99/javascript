<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro progama...</title>
    <style>
        body {
            background-color: rgb(215, 215, 207);
            color: rgb(62, 42, 14);
            font: normal 1.3em 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>
    <script>
        let n1 = Number(window.prompt('Digite um numero'))
        let n2 = Number(window.prompt('Digite um segundo numero'))
        const s = n1 + n2 
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`)
        //window.alert('resultado ' + String(s)) // Concatenação
        // (number + number) para adiçao
        // (string + string) para concatenaçao
    </script>

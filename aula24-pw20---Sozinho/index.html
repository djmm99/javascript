<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista </title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <header>
        <h1>Lista de Tarefa</h1>
        <nav>
            <input id="inputTask" type="text" name="nomeTarefa" placeholder="Digite sua Tarefa">
            <button id="buttonAdd" onclick="addTask()">
                <span class="material-symbols-outlined icone-send">add</span>
            </button>
        </nav>
    </header> 

    <main id="areaList">
      
        <div class="item">
            <div class="item-icon">
                <span class="material-symbols-outlined icone">circle</span>
            </div>
            <div class="item-task">
                <p>Tarefa para fazer</p>
            </div>
            <div class="item-delete">
                <button>
                    <span class="material-symbols-outlined item-fill">delete</span>
                    Deletar
                </button>
            </div>
        </div>

        <div id="check" class="item"> 
        <!-- MUDAR concluido PELO JS -->

            <div class="item-icon">
                <span class="material-symbols-outlined
                item-fill">
        <!-- MUDAR item-fill PELO JS -->

                    check_circle 
        <!-- Mudar check_circle POR circle PELO JS -->
        
                </span>
            </div>
            <div class="item-task">
                <p>Tarefa para feita</p>
            </div>
            <div class="item-delete">
                <button>
                    <span class="material-symbols-outlined item-fill">delete</span>
                    Deletar
                </button>
            </div>
        </div>
    </main>

    <footer>
        <p>Desenvolvido por <a target="_blank" href="https://djmm99.github.io/projeto-portifolio_v2/">djmm</a> </p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
